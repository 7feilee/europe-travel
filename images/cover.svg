<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="欧洲城市天际线">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a1410"/>
      <stop offset="0.55" stop-color="#5a2417"/>
      <stop offset="1" stop-color="#8a3a1f"/>
    </linearGradient>
    <radialGradient id="sun" cx="74%" cy="30%" r="34%">
      <stop offset="0" stop-color="#f0d9a8" stop-opacity="0.85"/>
      <stop offset="0.5" stop-color="#bb8a2e" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#bb8a2e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="city" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c0d0a"/>
      <stop offset="1" stop-color="#3a1d12"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#sky)"/>
  <rect width="1600" height="900" fill="url(#sun)"/>
  <circle cx="1184" cy="270" r="92" fill="#f3e2bb" opacity="0.9"/>
  <circle cx="1184" cy="270" r="92" fill="none" stroke="#bb8a2e" stroke-width="2" opacity="0.5"/>
  <!-- 远景城市剪影 -->
  <g fill="url(#city)" opacity="0.96">
    <!-- 地平线基座 -->
    <rect x="0" y="690" width="1600" height="210"/>
    <!-- 圣彼得/万神殿式穹顶 (罗马) -->
    <path d="M120 690 V560 a80 80 0 0 1 160 0 V690 Z"/>
    <rect x="190" y="500" width="20" height="60"/>
    <path d="M180 506 a20 14 0 0 1 40 0 Z"/>
    <!-- 佛罗伦萨主教堂八角穹顶 -->
    <path d="M360 690 V575 l70 -70 l70 70 V690 Z"/>
    <rect x="420" y="470" width="20" height="40"/>
    <!-- 钟楼 (威尼斯 campanile) -->
    <rect x="560" y="360" width="46" height="330"/>
    <path d="M560 360 l23 -54 l23 54 Z"/>
    <!-- 哥特尖塔群 (米兰/科隆/布拉格) -->
    <path d="M680 690 V470 l16 -40 l16 40 V690 Z"/>
    <path d="M712 690 V430 l18 -48 l18 48 V690 Z"/>
    <path d="M748 690 V470 l16 -40 l16 40 V690 Z"/>
    <!-- 古典神庙柱列 (雅典/古罗马) -->
    <g>
      <rect x="860" y="560" width="180" height="16"/>
      <rect x="860" y="676" width="180" height="14"/>
      <rect x="868" y="576" width="14" height="100"/>
      <rect x="900" y="576" width="14" height="100"/>
      <rect x="932" y="576" width="14" height="100"/>
      <rect x="964" y="576" width="14" height="100"/>
      <rect x="996" y="576" width="14" height="100"/>
      <rect x="1022" y="576" width="14" height="100"/>
      <path d="M852 560 l98 -40 l98 40 Z"/>
    </g>
    <!-- 巴洛克大穹顶 (维也纳/圣保罗) -->
    <path d="M1110 690 V560 a70 70 0 0 1 140 0 V690 Z"/>
    <rect x="1172" y="500" width="16" height="60"/>
    <circle cx="1180" cy="498" r="9"/>
    <!-- 圆顶尖塔/洋葱顶 (圣彼得堡/伊斯坦布尔) -->
    <path d="M1320 690 V580 q40 -10 40 -60 q0 -40 -20 -56 q-20 16 -20 56 q0 50 40 60 Z" transform="translate(-20 0)"/>
    <rect x="1392" y="470" width="14" height="220"/>
    <path d="M1380 470 q19 -70 38 0 Z"/>
    <!-- 城堡塔楼 (布拉格/温莎) -->
    <rect x="1470" y="540" width="70" height="150"/>
    <path d="M1470 540 h14 v-14 h14 v14 h14 v-14 h14 v14 h-70 Z" transform="translate(0 0)"/>
  </g>
  <!-- 金色细线地平 -->
  <rect x="0" y="688" width="1600" height="3" fill="#bb8a2e" opacity="0.6"/>
</svg>
